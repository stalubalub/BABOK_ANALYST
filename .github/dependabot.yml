version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /babok-mcp
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
