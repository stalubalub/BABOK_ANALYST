name: HOL Plugin Scanner

# Quality and security gate for awesome-codex-plugins listing.
# Required: score >= 80/100, no critical/high findings, workflow on main.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: HOL Plugin Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@260cc0d630501bd6507461c0f50dce5a13bd506d # v1.2.367
        with:
          plugin_dir: "."
          mode: scan
          fail_on_severity: none
          format: text
          upload_sarif: false
          write_step_summary: true
