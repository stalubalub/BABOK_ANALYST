name: Lint Stage Prompts

on:
  push:
    paths:
      - 'BABOK_AGENT/stages/**'
      - 'cli/scripts/lint-stages.js'
  pull_request:
    paths:
      - 'BABOK_AGENT/stages/**'
      - 'cli/scripts/lint-stages.js'

jobs:
  lint:
    name: Validate stage files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Lint stage files
        run: node cli/scripts/lint-stages.js
