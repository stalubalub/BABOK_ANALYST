name: Lint Stage Prompts

on:
  push:
    paths:
      - 'BABOK_AGENT/stages/**'
      - 'templates/**'
      - 'cli/scripts/lint-stages.js'
      - 'cli/src/templates.js'
      - 'tests/unit/templates.test.js'
  pull_request:
    paths:
      - 'BABOK_AGENT/stages/**'
      - 'templates/**'
      - 'cli/scripts/lint-stages.js'
      - 'cli/src/templates.js'
      - 'tests/unit/templates.test.js'

jobs:
  lint:
    name: Validate stage files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Lint stage files
        run: node cli/scripts/lint-stages.js

      - name: Validate templates (manifest + rubric headings)
        run: node --test tests/unit/templates.test.js
